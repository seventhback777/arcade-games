name: Compile Games
on:
    repository_dispatch:
    pull_request_target:
        types: [opened, reopened, synchronize, labeled, unlabeled, closed]
        branches: [main]

jobs:
    get-game-directory:
        if: |
            !contains(github.event.pull_request.labels.*.name, 'compiled') &&
            (github.event.action != 'closed' || github.event.pull_request.merged == true)
        runs-on: ubuntu-latest
        env:
            GAME_DIR:
            GIT_BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
            GITHUB_CONTEXT: ${{ toJson(github) }}  
        outputs:
            game-directory: ${{ steps.get-game-directory.outputs.game-directory }}
            CSharpFound: ${{ steps.get-game-directory.outputs.CSharpFound }}
            NoCSharpFound: ${{ steps.get-game-directory.outputs.NoCSharpFound }}
            Number-of-games: ${{ steps.get-game-directory.outputs.Number-of-games }}
        steps:
            - uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.action == 'closed' && github.event.pull_request.base.repo.full_name || github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.head_ref }}
                  fetch-depth: 0
                  submodules: "recursive"

            - id: get-game-directory
              env:
                  EVENT_ACTION: ${{ github.event.action }}
                  PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO_FULL_NAME: ${{ github.event.pull_request.base.repo.full_name }}
                  BOOTSTRAP: ${{ vars.BOOTSTRAP || 'false' }}
              run: |
                  cd $GITHUB_WORKSPACE
                  if [ "${EVENT_ACTION}" == "closed" ]; then
                    # Bootstrap detection via REST API (gh CLI silently fails in some PR contexts)
                    PREV_TAG=$(curl -sf -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${REPO_FULL_NAME}/releases/latest" | jq -r '.tag_name // empty' 2>/dev/null || echo "")
                    echo "PREV_TAG detection result: '${PREV_TAG}'"
                    echo "BOOTSTRAP override: '${BOOTSTRAP}'"

                    if [ "${BOOTSTRAP}" == "true" ] || [ -z "$PREV_TAG" ]; then
                      if [ "${BOOTSTRAP}" == "true" ]; then
                        echo "Bootstrap mode (forced via vars.BOOTSTRAP): compiling ALL games"
                      else
                        echo "Bootstrap mode (no previous release found): compiling ALL games"
                      fi
                      declare DIRECTORIES=($(ls -d games/*/ | sort))
                    else
                      echo "Merge event (previous release: $PREV_TAG) - compare base SHA ${PR_BASE_SHA} with HEAD"
                      declare DIRECTORIES=($(git diff --name-only ${PR_BASE_SHA} HEAD games | awk -F'/' '{print "games/" $2 "/"}' | sort -u))
                    fi
                  elif [ "${GIT_BASE_REPO}" == "thoth-tech/arcade-games" ]; then
                    git remote add upstream https://github.com/thoth-tech/arcade-games.git
                    git fetch upstream
                    echo "Compare upstream ${GITHUB_BASE_REF} with origin ${GITHUB_HEAD_REF}"
                    declare DIRECTORIES=($(git diff --name-only --merge-base upstream/${GITHUB_BASE_REF} origin/${GITHUB_HEAD_REF} games | awk -F'/' '{print "games/" $2 "/"}' | sort -u))
                  else
                    echo "Compare origin ${GITHUB_BASE_REF} with origin ${GITHUB_HEAD_REF}"
                    declare DIRECTORIES=($(git diff --name-only --merge-base origin/${GITHUB_BASE_REF} origin/${GITHUB_HEAD_REF} games | awk -F'/' '{print "games/" $2 "/"}' | sort -u))
                  fi
                    GAME_DIR=() 
                  for dir in "${DIRECTORIES[@]}"
                  do
                      if [ $(expr length ${dir//[!\/]}) -eq 2  ]; then
                          GAME_DIR+=($dir)
                      else 
                        echo skipping: $dir 
                      fi
                  done

                  #echo "::set-output name=game-directory::${GAME_DIR[@]}"
                  echo game-directory=${GAME_DIR[@]} >> $GITHUB_OUTPUT
                  CSharpFound=false  
                  NoCSharpFound=false

                  echo Games:
                  for dir in "${GAME_DIR[@]}"
                  do
                      echo "$dir"
                      # Recursive search: some games (2dRacer, SkySurge) have .csproj in subdirectories
                      if find "$dir" -maxdepth 3 -name "*.csproj" -print -quit | grep -q .; then
                        CSharpFound=true
                        echo "  -> detected as C#"
                      else
                        NoCSharpFound=true
                        echo "  -> detected as C++"
                      fi
                  done

                  echo Games located: "${#GAME_DIR[@]}"
                  echo C# Found: $CSharpFound
                  echo No C# Found: $NoCSharpFound
                  echo CSharpFound=$CSharpFound >> $GITHUB_OUTPUT
                  echo NoCSharpFound=$NoCSharpFound >> $GITHUB_OUTPUT
                  echo Number-of-games=${#GAME_DIR[@]} >> $GITHUB_OUTPUT

    compile-games-linux:
        if: needs.get-game-directory.outputs.Number-of-games > 0
        runs-on: ubuntu-latest
        needs: get-game-directory
        steps:
            - name: Checkout feature branch
              uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.action == 'closed' && github.event.pull_request.base.repo.full_name || github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.head_ref }}
                  fetch-depth: 1
                  submodules: "recursive"

            - name: Update Packages
              run: sudo apt-get update

            - name: Setup dotnet
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: |
                      6.0.x
                      7.0.x
            - name: Install SplashKit
              run: |
                  bash <(curl -s https://raw.githubusercontent.com/splashkit/skm/master/install-scripts/skm-install.sh)

            - name: Add splashkit to path
              run: echo "$HOME/.splashkit" >> $GITHUB_PATH
            - name: Install dependencies, compile splashkit
              run: |
                  skm linux install

            - name: Compile Game
              run: |
                  read GAME_DIR <<< "${{ needs.get-game-directory.outputs.game-directory }}"
                  FAILED=()
                  for dir in ${GAME_DIR[@]}
                  do
                    echo "::group::Compile $dir (linux-x86)"
                    if ./compile-game.sh $GITHUB_WORKSPACE/$dir linux-x86; then
                      echo "Compile script returned 0 for $dir"
                    else
                      echo "::warning::compile-game.sh exited non-zero for $dir on linux-x86"
                      FAILED+=("$dir")
                    fi
                    # Verify produced tarball is non-trivial (>1KB) — empty tarballs ~100B mean compile silently failed
                    game_name=$(basename "$dir")
                    produced=$(ls "$GITHUB_WORKSPACE/$dir/published/${game_name}-"*.tar.gz 2>/dev/null | head -n1)
                    if [ -z "$produced" ] || [ "$(stat -c%s "$produced" 2>/dev/null || echo 0)" -lt 1024 ]; then
                      echo "::warning::No usable artifact for $dir on linux-x86 (file: ${produced:-none})"
                      FAILED+=("$dir")
                    fi
                    echo "::endgroup::"
                  done
                  if [ ${#FAILED[@]} -gt 0 ]; then
                    printf '%s\n' "${FAILED[@]}" | sort -u > $GITHUB_WORKSPACE/failed-linux-x86.txt
                    echo "Games with linux-x86 build issues:"
                    cat $GITHUB_WORKSPACE/failed-linux-x86.txt
                  fi

            - uses: actions/upload-artifact@v4
              with:
                  name: linux-programs
                  path: |
                      **/games/*/published/
            # This can be used to debug the build, see https://github.com/lhotari/action-upterm
            # Open the comile log for Linux, and copy the ssh connection. Note you need to have setup a public key for your SSh connection try ssh-keygen -t ed25519 if you get Permission denied (publickey)

            # - name: Setup upterm session
            #   uses: lhotari/action-upterm@v1
    compile-dotnet-games-arm:
        if: needs.get-game-directory.outputs.CSharpFound == 'true' && needs.get-game-directory.outputs.Number-of-games > 0
        runs-on: ubuntu-latest
        needs: get-game-directory
        steps:
            - name: Checkout feature branch
              uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.action == 'closed' && github.event.pull_request.base.repo.full_name || github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.head_ref }}
                  fetch-depth: 1
                  submodules: "recursive"
            - name: Update Packages
              run: sudo apt-get update

            - name: Setup dotnet
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: |
                      6.0.x
                      7.0.x
            - name: Install SplashKit
              run: |
                  bash <(curl -s https://raw.githubusercontent.com/splashkit/skm/master/install-scripts/skm-install.sh)

            - name: Add splashkit to path
              run: echo "$HOME/.splashkit" >> $GITHUB_PATH
            - name: Install dependencies, compile splashkit
              run: |
                  skm linux install

            - name: Compile Game
              run: |
                  read GAME_DIR <<< "${{ needs.get-game-directory.outputs.game-directory }}"
                  GAME_DIR=($GAME_DIR)
                  for dir in ${GAME_DIR[@]}
                  do
                    echo "check " $dir
                    if find "$dir" -maxdepth 3 -name "*.csproj" -print -quit | grep -q .; then
                      echo "Running for " $dir
                      ./compile-game.sh $GITHUB_WORKSPACE/$dir linux-arm || echo "::warning::compile-game.sh failed for $dir on linux-arm (C#)"
                    fi
                  done

            - uses: actions/upload-artifact@v4
              with:
                  name: dotnet-arm-programs
                  path: |
                      **/games/*/published/

    compile-games-windows:
        if: needs.get-game-directory.outputs.Number-of-games > 0
        runs-on: windows-latest
        needs: get-game-directory
        defaults:
            run:
                shell: msys2 {0}

        steps:
            - uses: msys2/setup-msys2@v2
              with:
                  msystem: MINGW64
                  update: true
                  install: git mingw-w64-x86_64-cc
            - name: Setup dotnet
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: |
                      6.0.x
                      7.0.x
            - uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.action == 'closed' && github.event.pull_request.base.repo.full_name || github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.head_ref }}
                  fetch-depth: 1
                  submodules: "recursive"

            - name: Install SplashKit
              run: |
                  bash <(curl -s https://raw.githubusercontent.com/splashkit/skm/master/install-scripts/skm-install.sh)
            - name: Compile Game
              run: |
                  export PATH=$PATH:/home/runneradmin/.splashkit
                  export PATH=$PATH:/c/Program\ Files/dotnet
                  echo $PATH
                  read GAME_DIR <<< "${{ needs.get-game-directory.outputs.game-directory }}"
                  for dir in ${GAME_DIR[@]}
                  do
                    echo "::group::Compile $dir (win-x86)"
                    ./compile-game.sh $GITHUB_WORKSPACE/$dir win-x86 || echo "::warning::compile-game.sh exited non-zero for $dir on win-x86"
                    game_name=$(basename "$dir")
                    produced=$(ls "$GITHUB_WORKSPACE/$dir/published/${game_name}-"*.tar.gz 2>/dev/null | head -n1)
                    if [ -z "$produced" ] || [ "$(stat -c%s "$produced" 2>/dev/null || echo 0)" -lt 1024 ]; then
                      echo "::warning::No usable artifact for $dir on win-x86 (file: ${produced:-none})"
                    fi
                    echo "::endgroup::"
                  done

            - uses: actions/upload-artifact@v4
              with:
                  name: windows-programs
                  path: |
                      **/games/*/published/

    compile-games-arm:
        if: needs.get-game-directory.outputs.NoCSharpFound == 'true' && needs.get-game-directory.outputs.Number-of-games > 0
        runs-on: ubuntu-latest
        needs: get-game-directory
        steps:
            - uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.action == 'closed' && github.event.pull_request.base.repo.full_name || github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.head_ref }}
                  fetch-depth: 1
                  submodules: "recursive"
            - name: Install Splashkit & Compile Game
              uses: pguyot/arm-runner-action@v2
              with:
                  cpu: cortex-a8
                  base_image: raspios_lite:latest
                  image_additional_mb: 4096
                  shell: bash
                  import_github_env: true
                  export_github_env: true
                  bind_mount_repository: true
                  commands: |
                      read GAME_DIR <<< "${{ needs.get-game-directory.outputs.game-directory }}"
                      sudo apt-get update
                      sudo apt install --assume-yes git cmake
                      # curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel STS
                      # export PATH=$PATH:$HOME/.dotnet
                      # export DOTNET_ROOT=$HOME/.dotnet
                      # echo $PATH
                      # echo $DOTNET_ROOT
                      # dotnet --version
                      bash <(curl -s https://raw.githubusercontent.com/splashkit/skm/master/install-scripts/skm-install.sh)
                      export PATH=$PATH:$HOME/.splashkit
                      sudo apt install --assume-yes libsdl2-dev libsdl2-gfx-dev libsdl2-mixer-dev libsdl2-ttf-dev libsdl2-net-dev libsdl2-image-dev libncurses-dev libpng-dev libcurl4-openssl-dev libbz2-dev libflac-dev libvorbis-dev libmikmod-dev libwebp-dev libfreetype6-dev
                      skm linux install
                      for dir in ${GAME_DIR[@]}
                      do
                        if ! find "$dir" -maxdepth 3 -name "*.csproj" -print -quit | grep -q .; then
                          ./compile-game.sh $dir linux-arm || echo "::warning::compile-game.sh failed for $dir on linux-arm (C++)"
                        fi
                      done

            - uses: actions/upload-artifact@v4
              with:
                  name: arm-programs
                  path: |
                      **/games/*/published/

    publish-release:
        runs-on: ubuntu-latest
        needs:
            [
                get-game-directory,
                compile-games-linux,
                compile-games-windows,
                compile-games-arm,
                compile-dotnet-games-arm,
            ]
        if: |
            always() &&
            github.event.pull_request.merged == true &&
            needs.compile-games-windows.result == 'success' &&
            needs.compile-games-linux.result == 'success' &&
            (needs.compile-games-arm.result == 'success' || needs.compile-games-arm.result == 'skipped') &&
            (needs.compile-dotnet-games-arm.result == 'success' || needs.compile-dotnet-games-arm.result == 'skipped')
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        steps:
            - uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.pull_request.base.repo.full_name }}
                  ref: ${{ github.event.pull_request.merge_commit_sha }}
                  fetch-depth: 1

            - uses: actions/download-artifact@v4
              with:
                  name: windows-programs
                  path: ./windows-downloads

            - uses: actions/download-artifact@v4
              with:
                  name: linux-programs
                  path: ./linux-downloads

            - uses: actions/download-artifact@v4
              if: needs.compile-games-arm.result == 'success'
              with:
                  name: arm-programs
                  path: ./arm-downloads

            - uses: actions/download-artifact@v4
              if: needs.compile-dotnet-games-arm.result == 'success'
              with:
                  name: dotnet-arm-programs
                  path: ./arm-downloads

            - name: Prepare release assets (merge fresh + previous)
              run: |
                  mkdir -p release-assets old-assets

                  # Try to find previous release and download its assets for reuse
                  PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty' 2>/dev/null || echo "")
                  if [ -n "$PREV_TAG" ]; then
                    echo "Reusing assets from previous release: $PREV_TAG"
                    gh release download "$PREV_TAG" -D old-assets/ --pattern '*.tar.gz' || echo "(some/all downloads failed, continuing)"
                  else
                    echo "Bootstrap: no previous release found"
                  fi

                  # Mapping: platform -> fresh-build directory and tar.gz suffix used by compile-game.sh
                  declare -A FRESH_DIR=(
                    ["linux-x86"]="linux-downloads"
                    ["linux-arm"]="arm-downloads"
                    ["windows"]="windows-downloads"
                  )
                  declare -A FRESH_SUFFIX=(
                    ["linux-x86"]="linux-x86"
                    ["linux-arm"]="linux-arm"
                    ["windows"]="win-x86"
                  )

                  # Iterate over ALL games in the repo (not just changed ones)
                  # Minimum size threshold (1KB) — anything smaller is an empty tar.gz from a failed compile
                  MIN_SIZE=1024
                  for game_dir in games/*/; do
                    game_name=$(basename "$game_dir")
                    for platform in linux-x86 linux-arm windows; do
                      fresh_path="${FRESH_DIR[$platform]}/games/${game_name}/published/${game_name}-${FRESH_SUFFIX[$platform]}.tar.gz"
                      old_path="old-assets/${game_name}__${platform}.tar.gz"
                      dest="release-assets/${game_name}__${platform}.tar.gz"

                      fresh_size=0
                      [ -f "$fresh_path" ] && fresh_size=$(stat -c%s "$fresh_path" 2>/dev/null || echo 0)
                      old_size=0
                      [ -f "$old_path" ] && old_size=$(stat -c%s "$old_path" 2>/dev/null || echo 0)

                      if [ "$fresh_size" -ge "$MIN_SIZE" ]; then
                        cp "$fresh_path" "$dest"
                        echo "FRESH:   $game_name $platform (${fresh_size} bytes)"
                      elif [ "$old_size" -ge "$MIN_SIZE" ]; then
                        cp "$old_path" "$dest"
                        echo "REUSE:   $game_name $platform (${old_size} bytes from $PREV_TAG)"
                      elif [ "$fresh_size" -gt 0 ]; then
                        echo "::warning::SKIP $game_name $platform: fresh build empty (${fresh_size}B), no usable previous asset"
                      elif [ "$old_size" -gt 0 ]; then
                        echo "::warning::SKIP $game_name $platform: previous asset empty (${old_size}B), no fresh build"
                      else
                        echo "::warning::MISSING $game_name $platform: no fresh build, no previous asset"
                      fi
                    done
                  done

                  echo "---"
                  echo "Final release assets:"
                  ls -la release-assets/ | tail -n +2

            - name: Generate release tag
              id: release-tag
              run: |
                  SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
                  DATE=$(date +'%Y%m%d')
                  echo "tag=release-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

            - name: Publish GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.release-tag.outputs.tag }}
                  name: "Arcade Games ${{ steps.release-tag.outputs.tag }}"
                  files: release-assets/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    add-compiled-label:
        needs: publish-release
        if: |
            always() &&
            needs.publish-release.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - name: Add label
              uses: andymckay/labeler@master
              with:
                  add-labels: "compiled"
